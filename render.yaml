
services:
  - type: web
    name: vcnr-secure-backend
    env: python
    plan: starter
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn vcnr_secure_backend:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
